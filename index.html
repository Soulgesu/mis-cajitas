<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Gestor de textos copiables para Ingeniería de Sistemas" />
  <title>Cajitas Pro Edition</title>
  <link rel="icon" href="./icons/icon-512.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script>
    const t = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", t);
  </script>
</head>

<body>
  <header class="header-sticky">
    <div class="wrap">
      <div class="title">Cajitas copiables (Sistemas)</div>

      <div class="row">
        <input id="newGroupName" placeholder="Nuevo grupo..." />
        <button class="primary" id="createGroupBtn">Crear grupo</button>
      </div>

      <div class="top">
        <textarea id="input" placeholder="Escribe el texto aquí... (Ctrl+Enter)"></textarea>
        <select id="groupSelect"></select>
        <div class="global-actions">
          <button id="addBtn">Agregar</button>
          <div class="backup-tools">
            <button id="exportBtn" title="Exportar JSON">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </button>
            <button id="importBtn" title="Importar JSON">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
            </button>
            <button class="danger" id="clearAllBtn" title="Borrar Todo">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
            <input type="file" id="fileInput" accept=".json" style="display:none" />
          </div>
        </div>
      </div>
      <div class="muted" style="margin-top: 14px 0; line-height: 1.5;">Tips:
        <b>Ctrl + Enter</b> para agregar. Clic en cajita para copiar. Arrastra desde <span
          class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">drag_indicator</span> para
        ordenar.
      </div>
    </div>
  </header>



  <div class="wrap">
    <div class="groups" id="groups"></div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
